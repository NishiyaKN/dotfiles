# ===== mpv.conf — anime, 1080p -> 1440p, RX 9060 XT =====

# ---- Output & decode ----
profile=high-quality          # good quality baseline; specifics overridden below
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe               # picks vaapi on your card; 0 dropped frames confirmed
fbo-format=auto
gpu-shader-cache-dir="~~/_cache/shader"   # caches ArtCNN compile -> fast startup

# ---- Scaling (sharp-leaning; ArtCNN handles luma when a preset is active) ----
scale=ewa_lanczossharp        # SHARP upscaler — the crisp look from your "cleared" shot
dscale=catmull_rom            # downscaler — the 4K->1440 step when ArtCNN is on; sharp + clean
cscale=ewa_lanczos            # chroma; sharp here only adds colour ringing
scale-antiring=0.7            # tame ringing from the sharp filter
dscale-antiring=0.7
cscale-antiring=0.7
linear-downscaling=no         # avoid dark halos on high-contrast line art
# scale-blur=0.95             # UNCOMMENT to push the upscaler even sharper (more ringing)

# ---- Debanding (for the 1.1 Mbps WEB source) ----
deband=yes
deband-iterations=2
deband-threshold=40
deband-range=16
deband-grain=4                # raise toward 12+ if you still see banding in gradients

# ---- Dither (10-bit source, high-end GPU) ----
dither=error-diffusion
dither-depth=auto

# ---- Colour / display ----
target-prim=auto
target-trc=auto
# icc-profile-auto            # only enable if you have a real calibrated ICC profile

# ---- Motion (anime: no frame blending; RIFE is on your 'v' keybind) ----
interpolation=no

# ---- Subtitles ----
sub-ass-override=no           # preserve fansub typesetting/signs (see note)
sub-font='Noto Sans CJK JP'   # applies to plain SRT subs only
sub-font-size=45
alang=ja,jp,jpn,en,eng
slang=en,eng

# ---- Screenshots (png = lossless — matters for your shader comparisons) ----
screenshot-directory="~/Pictures/mpv"
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-png-compression=3
screenshot-template="%f-%wH.%wM.%wS.%wT-#%#00n"
