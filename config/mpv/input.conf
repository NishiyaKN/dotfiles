l no-osd seek 2 exact
h no-osd seek -2 exact
k cycle pause
j no-osd cycle sub-visibility
KP2 no-osd cycle sub-visibility
KP3 cycle pause
KP_ENTER no-osd seek 4 exact
KP1 no-osd seek -4 exact
KP_INS show-progress
L add chapter 1
H add chapter -1

WHEEL_UP seek 10
WHEEL_DOWN seek -10

# ---- Anime upscaling presets ----
# CTRL+1: daily driver — your sharp Anime4K chain (the favorite you tuned)
CTRL+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_Thin_HQ.glsl:~~/shaders/adaptive-sharpen.glsl"; show-text "Anime4K Sharp"
# CTRL+2: same look, gentler restore — for low-bitrate / rough sources
CTRL+2 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_Soft_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_Thin_HQ.glsl:~~/shaders/adaptive-sharpen.glsl"; show-text "Anime4K Sharp — Soft"
# CTRL+3: clean/faithful alternative — calm, no sharpening crawl (good on pristine BD or busy motion)
CTRL+3 no-osd change-list glsl-shaders set "~~/shaders/ArtCNN_C4F32_DS.glsl"; show-text "ArtCNN clean"
# CTRL+0: off
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "Shaders off"
